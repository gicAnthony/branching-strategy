// ─── Panel helpers ─────────────────────────────────────────────────────────
function showPanel(key) {
  const d = INFO[key];
  if (!d) return;
  document.getElementById('panel-title').textContent = d.title;
  document.getElementById('panel-body').innerHTML = d.body;
  document.getElementById('info-panel').classList.add('open');
}
document.getElementById('close-panel').onclick = () =>
  document.getElementById('info-panel').classList.remove('open');

// ─── Shared drawing helpers ────────────────────────────────────────────────
function drawBg(scene, W, H) {
  const g = scene.add.graphics();
  g.fillGradientStyle(0x0a1628, 0x0a1628, 0x0d2040, 0x0d2040, 1);
  g.fillRect(0, 0, W, H);
  // subtle grid
  g.lineStyle(1, 0x1a3055, 0.3);
  for (let x = 0; x < W; x += 60) g.lineBetween(x, 0, x, H);
  for (let y = 0; y < H; y += 60) g.lineBetween(0, y, W, y);
  // corner accents (orange like background.png)
  g.lineStyle(3, C.gold, 0.6);
  g.lineBetween(0, H * 0.3, 0, H);
  g.lineBetween(0, H, W * 0.3, H);
  g.lineBetween(W, 0, W, H * 0.7);
  g.lineBetween(W * 0.7, 0, W, 0);
  return g;
}

function makeBranch(scene, x1, y1, x2, y2, color, label, thickness = 3) {
  const g = scene.add.graphics();
  g.lineStyle(thickness, color, 1);
  g.lineBetween(x1, y1, x2, y2);
  // arrow head
  const angle = Math.atan2(y2 - y1, x2 - x1);
  const al = 12;
  g.lineBetween(x2, y2, x2 - al * Math.cos(angle - 0.4), y2 - al * Math.sin(angle - 0.4));
  g.lineBetween(x2, y2, x2 - al * Math.cos(angle + 0.4), y2 - al * Math.sin(angle + 0.4));
  if (label) {
    scene.add.text((x1 + x2) / 2, (y1 + y2) / 2 - 12, label, {
      fontSize: '11px', color: '#' + color.toString(16).padStart(6, '0'),
      fontFamily: 'monospace'
    }).setOrigin(0.5);
  }
  return g;
}

function makeNode(scene, x, y, color, label, infoKey, radius = 14) {
  const g = scene.add.graphics();
  g.fillStyle(color, 1);
  g.fillCircle(x, y, radius);
  g.lineStyle(2, 0xffffff, 0.4);
  g.strokeCircle(x, y, radius);

  // hit zone
  const hit = scene.add.circle(x, y, radius + 6, 0xffffff, 0)
    .setInteractive({ useHandCursor: true });
  hit.on('pointerover', () => { g.clear(); g.fillStyle(color, 1); g.fillCircle(x, y, radius + 3); g.lineStyle(2, C.gold, 1); g.strokeCircle(x, y, radius + 3); });
  hit.on('pointerout',  () => { g.clear(); g.fillStyle(color, 1); g.fillCircle(x, y, radius); g.lineStyle(2, 0xffffff, 0.4); g.strokeCircle(x, y, radius); });
  hit.on('pointerdown', () => infoKey && showPanel(infoKey));

  if (label) {
    scene.add.text(x, y + radius + 8, label, {
      fontSize: '11px', color: '#aabbcc', fontFamily: 'monospace'
    }).setOrigin(0.5, 0);
  }
  return { g, hit };
}

function makeClickBox(scene, x, y, w, h, color, title, infoKey) {
  const g = scene.add.graphics();
  g.lineStyle(1, color, 0.7);
  g.fillStyle(color, 0.1);
  g.strokeRoundedRect(x - w/2, y - h/2, w, h, 8);
  g.fillRoundedRect(x - w/2, y - h/2, w, h, 8);
  scene.add.text(x, y, title, {
    fontSize: '13px', color: '#' + color.toString(16).padStart(6, '0'),
    fontFamily: 'monospace', wordWrap: { width: w - 16 }, align: 'center'
  }).setOrigin(0.5);
  const hit = scene.add.rectangle(x, y, w, h, 0xffffff, 0).setInteractive({ useHandCursor: true });
  hit.on('pointerdown', () => showPanel(infoKey));
  hit.on('pointerover', () => { g.clear(); g.lineStyle(2, C.gold, 1); g.fillStyle(color, 0.2); g.strokeRoundedRect(x-w/2,y-h/2,w,h,8); g.fillRoundedRect(x-w/2,y-h/2,w,h,8); });
  hit.on('pointerout',  () => { g.clear(); g.lineStyle(1, color, 0.7); g.fillStyle(color, 0.1); g.strokeRoundedRect(x-w/2,y-h/2,w,h,8); g.fillRoundedRect(x-w/2,y-h/2,w,h,8); });
  return { g, hit };
}

// ─── Animated commit dot ───────────────────────────────────────────────────
function animCommit(scene, x, y, color, delay = 0) {
  const c = scene.add.graphics();
  c.fillStyle(color, 0);
  c.fillCircle(x, y, 8);
  scene.time.delayedCall(delay, () => {
    scene.tweens.add({
      targets: c, alpha: { from: 0, to: 1 }, duration: 400,
      onComplete: () => {
        c.clear(); c.fillStyle(color, 1); c.fillCircle(x, y, 8);
        c.lineStyle(2, 0xffffff, 0.5); c.strokeCircle(x, y, 8);
      }
    });
  });
  return c;
}

      }).setOrigin(0.5);

    // Branch type legend (all 4 long-lived + work branches)
    const btypes = [
      { label: 'development',         color: C.main,    info: 'development' },
      { label: 'staging (QA)',        color: C.chore,   info: 'staging' },
      { label: 'release/yyyy-mm-dd',  color: C.release, info: 'release' },
      { label: 'main (prod)',         color: C.gold,    info: 'main' },
      { label: 'feature/*',           color: C.feature, info: 'feature' },
      { label: 'bugfix/*',            color: C.bugfix,  info: 'bugfix' },
      { label: 'hotfix/*',            color: C.hotfix,  info: 'hotfix' },
      { label: 'spike/*',             color: C.spike,   info: 'spike' },
    ];
    this.add.text(W/2, H*0.52, 'Branch Types (click to learn)', {
      fontSize: '14px', color: '#f39c12', fontFamily: 'Segoe UI', fontStyle: 'bold'
    }).setOrigin(0.5);

    btypes.forEach((b, i) => {
      const col = i % 4, row = Math.floor(i / 4);
      const bx = W*0.165 + col * (W*0.22), by = H*0.60 + row * 56;
      makeClickBox(this, bx, by, 165, 40, b.color, b.label, b.info);
    });

    // lifecycle mini-strip at bottom
    this.add.text(W/2, H*0.80, 'Branch Lifecycle: 6 Stages', {
      fontSize: '14px', color: '#f39c12', fontFamily: 'Segoe UI', fontStyle: 'bold'
    }).setOrigin(0.5);
    const stages = ['0 Claim','1 Birth','2 Develop','3 Integrate','4 Merge','5 Delete'];
    stages.forEach((s, i) => {
      const sx = W*0.1 + i * (W*0.8/5.5), sy = H*0.88;
      const col = [C.gold,C.feature,C.main,C.chore,C.release,C.bugfix][i];
      const g = this.add.graphics();
      g.fillStyle(col, 0.15); g.lineStyle(1,col,0.8);
      g.strokeRoundedRect(sx-36,sy-18,72,36,6);
      g.fillRoundedRect(sx-36,sy-18,72,36,6);
      this.add.text(sx, sy, s, { fontSize: '11px', color: '#cdd', fontFamily: 'Segoe UI', align:'center' }).setOrigin(0.5);
      if (i < 5) {
        const g2 = this.add.graphics();
        g2.lineStyle(1,C.gold,0.4);
        g2.lineBetween(sx+40,sy,sx+44,sy);
        g2.lineBetween(sx+44,sy,sx+40,sy-4);
        g2.lineBetween(sx+44,sy,sx+40,sy+4);
      }
    });

    // floating particles
    for (let i = 0; i < 20; i++) {
      const px = Phaser.Math.Between(0, W);
      const py = Phaser.Math.Between(0, H);
      const pc = [C.gold, C.main, C.feature][i % 3];
      const p = this.add.graphics();
      p.fillStyle(pc, 0.4);
      p.fillCircle(px, py, Phaser.Math.Between(1,3));
      this.tweens.add({
        targets: p, y: py - Phaser.Math.Between(30,80), alpha: 0,
        duration: Phaser.Math.Between(3000,6000), ease: 'Sine.easeIn',
        loop: -1, delay: Phaser.Math.Between(0,3000), yoyo: false,
        onComplete: () => { p.y = py; p.alpha = 0.4; }
      });
    }
  }
}

// SCENE: TIER 1 - SOLO

// SCENE: TIER 2 - SMALL TEAM (full DevOps baseline)
// ═══════════════════════════════════════════════════════════════════════════
class Tier2Scene extends Phaser.Scene {
  constructor() { super({ key: 'Tier2Scene' }); }
  create() {
    const W = this.scale.width, H = this.scale.height;
    drawBg(this, W, H);

    this.add.text(W/2, 36, 'Tier 2: Small Team (2-8 contributors) - full DevOps baseline', {
      fontSize: '18px', color: '#f39c12', fontFamily: 'Segoe UI', fontStyle: 'bold'
    }).setOrigin(0.5);
    this.add.text(W/2, 60, 'feature cut from staging -> PR to development -> PR back to staging -> release/UAT -> main', {
      fontSize: '11px', color: '#8899aa', fontFamily: 'Segoe UI'
    }).setOrigin(0.5);

    // Four horizontal lanes, top -> bottom = downstream -> upstream
    // Layout: development (top, work integrates here first), staging, release/UAT, main (bottom, production)
    const devY  = H * 0.22;
    const stgY  = H * 0.38;
    const relY  = H * 0.54;
    const mnY   = H * 0.70;
    const laneL = 130, laneR = W - 80;

    const drawLane = (y, color, label, sub) => {
      const g = this.add.graphics();
      g.lineStyle(4, color, 0.9);
      g.lineBetween(laneL, y, laneR, y);
      this.add.text(laneL - 8, y, label, { fontSize: '12px', color: '#' + color.toString(16).padStart(6,'0'), fontFamily: 'monospace', fontStyle: 'bold' }).setOrigin(1, 0.5);
      this.add.text(laneL - 8, y + 14, sub, { fontSize: '9px', color: '#8899aa', fontFamily: 'Segoe UI' }).setOrigin(1, 0.5);
    };
    drawLane(devY, C.main,    'development', 'integration env');
    drawLane(stgY, C.chore,   'staging',     'QA env (testers)');
    drawLane(relY, C.release, 'release/yyyy-mm-dd', 'UAT env');
    drawLane(mnY,  C.gold,    'main',        'production');

    // Commits / nodes on each long-lived branch
    const commitDot = (x, y, color, r=7) => {
      const c = this.add.graphics();
      c.fillStyle(color, 1); c.fillCircle(x, y, r);
      c.lineStyle(2, 0xffffff, 0.5); c.strokeCircle(x, y, r);
      return c;
    };
    [200, 320, 460, 600, 760, 900].forEach(x => commitDot(x, devY, C.main));
    [260, 460, 760].forEach(x => commitDot(x, stgY, C.chore));
    commitDot(760, relY, C.release, 8);
    commitDot(900, mnY,  C.gold, 9);

    // Feature branch: cut from staging, PR to development, then PR to staging
    const fxStart = 260;     // cut point on staging
    const fxDev   = 460;     // first PR target on development
    const fxStg2  = 460;     // second PR target on staging (right after dev integration passes)
    const fxBranchY = (devY + stgY) / 2 - 30; // floats above staging

    this.time.delayedCall(250, () => {
      const g = this.add.graphics();
      g.lineStyle(3, C.feature, 1);
      // cut from staging at fxStart, go up to feature lane
      g.lineBetween(fxStart, stgY, fxStart, fxBranchY);
      // feature branch lives between fxStart and fxDev
      g.lineBetween(fxStart, fxBranchY, fxDev, fxBranchY);
      // PR #1: down to development
      g.lineBetween(fxDev, fxBranchY, fxDev, devY);
      this.add.text((fxStart + fxDev) / 2, fxBranchY - 12, 'feature/APP-101-dashboard', {
        fontSize: '10px', color: '#2ecc71', fontFamily: 'monospace'
      }).setOrigin(0.5);
      // arrow head into dev
      const ah = this.add.graphics();
      ah.lineStyle(2, C.feature, 1);
      ah.lineBetween(fxDev, devY, fxDev - 5, devY - 6);
      ah.lineBetween(fxDev, devY, fxDev + 5, devY - 6);
      this.add.text(fxDev + 6, (fxBranchY + devY) / 2, 'PR #1\nintegration', {
        fontSize: '9px', color: '#2ecc7199', fontFamily: 'Segoe UI'
      });

      // PR #2: same feature branch back to staging (offset slightly right so visible)
      const fxStg2X = fxDev + 60;
      const g2 = this.add.graphics();
      g2.lineStyle(2, C.feature, 0.7);
      // shows continuation of feature branch then PR to staging
      g2.lineBetween(fxDev, fxBranchY, fxStg2X, fxBranchY);
      g2.lineBetween(fxStg2X, fxBranchY, fxStg2X, stgY);
      const ah2 = this.add.graphics();
      ah2.lineStyle(2, C.feature, 1);
      ah2.lineBetween(fxStg2X, stgY, fxStg2X - 5, stgY - 6);
      ah2.lineBetween(fxStg2X, stgY, fxStg2X + 5, stgY - 6);
      this.add.text(fxStg2X + 6, (fxBranchY + stgY) / 2, 'PR #2\nQA', {
        fontSize: '9px', color: '#2ecc7199', fontFamily: 'Segoe UI'
      });
    });

    // Release branch: cut from staging near sprint end, lives to UAT, merges to main
    this.time.delayedCall(800, () => {
      const cutX = 760, mergeX = 900;
      const g = this.add.graphics();
      g.lineStyle(3, C.release, 0.95);
      g.lineBetween(cutX, stgY, cutX, relY);
      g.lineBetween(cutX, relY, mergeX, relY);
      g.lineBetween(mergeX, relY, mergeX, mnY);
      this.add.text((cutX + mergeX) / 2, relY - 12, 'release/2026-05-22', {
        fontSize: '10px', color: '#9b59b6', fontFamily: 'monospace'
      }).setOrigin(0.5);
      // tag on main
      const tag = this.add.text(mergeX, mnY + 22, 'tag v3.2.0', {
        fontSize: '10px', color: '#f39c12', fontFamily: 'monospace'
      }).setOrigin(0.5, 0);
      this.tweens.add({ targets: tag, alpha: { from: 0, to: 1 }, duration: 600 });
    });

    // Hotfix branch: from main tag, back to main, forward-port to lower envs
    this.time.delayedCall(1400, () => {
      const hfStart = 220, hfBack = 300;
      const hfY = mnY + 50;
      const g = this.add.graphics();
      g.lineStyle(2, C.hotfix, 0.9);
      g.lineBetween(hfStart, mnY, hfStart, hfY);
      g.lineBetween(hfStart, hfY, hfBack, hfY);
      g.lineBetween(hfBack, hfY, hfBack, mnY);
      this.add.text((hfStart + hfBack) / 2, hfY + 8, 'hotfix/APP-99-fix', {
        fontSize: '10px', color: '#e67e22', fontFamily: 'monospace'
      }).setOrigin(0.5, 0);
      // forward-port dashed lines upward to release, staging, development
      const fpX = hfBack + 4;
      [relY, stgY, devY].forEach((targetY, i) => {
        const dg = this.add.graphics();
        dg.lineStyle(1, C.hotfix, 0.45);
        const startY = mnY;
        // simple straight line up
        dg.lineBetween(fpX, startY, fpX + 30 + i * 12, targetY);
      });
      this.add.text(hfBack + 90, mnY - 8, 'forward-port to\nrelease, staging, dev', {
        fontSize: '9px', color: '#e67e2299', fontFamily: 'Segoe UI'
      }).setOrigin(0, 1);
    });

    // Rules box
    const rules = [
      '✓  feature/* cut from staging (per baseline)',
      '✓  PR #1 to development (integration), PR #2 to staging (QA)',
      '✓  release/yyyy-mm-dd cut from staging at sprint end',
      '✓  UAT validates on release/*, merge to main + tag',
      '✓  hotfix from main tag -> main -> forward-port',
      '✓  Minimum 1 reviewer, naming enforced, auto-delete on merge',
    ];
    const rx = W*0.04, ry = H*0.88;
    const rg = this.add.graphics();
    rg.lineStyle(1, C.main, 0.3); rg.fillStyle(C.main, 0.05);
    rg.strokeRoundedRect(rx-10, ry-14, 380, rules.length*14+8, 8);
    rg.fillRoundedRect(rx-10, ry-14, 380, rules.length*14+8, 8);
    this.add.text(rx+180, ry-20, 'Small Team Rules', { fontSize:'12px', color:'#3498db', fontFamily:'Segoe UI', fontStyle:'bold' }).setOrigin(0.5, 1);
    rules.forEach((r,i) => {
      this.add.text(rx, ry+i*14, r, { fontSize: '10px', color: '#2ecc71', fontFamily:'Segoe UI' });
    });

    makeClickBox(this, W*0.62, H*0.93, 120, 32, C.main,    'Tier 2',     'tier2');
    makeClickBox(this, W*0.74, H*0.93, 120, 32, C.feature, 'feature/*',  'feature');
    makeClickBox(this, W*0.86, H*0.93, 120, 32, C.release, 'release/*',  'release');
    makeClickBox(this, W*0.98 - 60, H*0.93, 120, 32, C.hotfix, 'hotfix/*', 'hotfix');
  }
}

// SCENE: LIFECYCLE
// ═══════════════════════════════════════════════════════════════════════════
class LifecycleScene extends Phaser.Scene {
  constructor() { super({ key: 'LifecycleScene' }); }
  create() {
    const W = this.scale.width, H = this.scale.height;
    drawBg(this, W, H);

    this.add.text(W/2, 38, 'Branch Lifecycle: 6 Stages', {
      fontSize: '20px', color: '#f39c12', fontFamily: 'Segoe UI', fontStyle: 'bold'
    }).setOrigin(0.5);
    this.add.text(W/2, 66, 'Every branch moves through these stages. Click each to learn.', {
      fontSize: '12px', color: '#8899aa', fontFamily: 'Segoe UI'
    }).setOrigin(0.5);

    const stages = [
      { key:'lifecycle0', label:'0\nCLAIM',     sub:'Ticket → In Progress\nName branch\nCheck overlap', color:C.gold },
      { key:'lifecycle1', label:'1\nBIRTH',     sub:'Push branch\nDraft PR\nCorrect base', color:C.feature },
      { key:'lifecycle2', label:'2\nDEVELOP',   sub:'Commit small\nSync daily\nSet TTL', color:C.main },
      { key:'lifecycle3', label:'3\nINTEGRATE', sub:'Open PR\nCI gates\nCode review', color:C.chore },
      { key:'lifecycle4', label:'4\nMERGE',     sub:'Squash to main\nTag release\nHotfix dual-merge', color:C.release },
      { key:'lifecycle5', label:'5\nDELETE',    sub:'Auto-delete\nSweep stale\nNo "just in case"', color:C.bugfix },
    ];

    const stageW = (W - 120) / stages.length;
    const centerY = H * 0.42;

    // connecting line
    const lg = this.add.graphics();
    lg.lineStyle(2, C.gold, 0.3);
    lg.lineBetween(80, centerY, W - 60, centerY);

    stages.forEach((s, i) => {
      const sx = 100 + i * stageW + stageW/2;
      // box
      const g = this.add.graphics();
      g.fillStyle(s.color, 0.15); g.lineStyle(2, s.color, 0.8);
      g.strokeRoundedRect(sx - 70, centerY - 55, 140, 110, 10);
      g.fillRoundedRect(sx - 70, centerY - 55, 140, 110, 10);
      this.add.text(sx, centerY - 20, s.label, {
        fontSize: '18px', color: '#'+s.color.toString(16).padStart(6,'0'),
        fontFamily: 'Segoe UI', fontStyle: 'bold', align: 'center'
      }).setOrigin(0.5);
      this.add.text(sx, centerY + 20, s.sub, {
        fontSize: '10px', color: '#aabbcc', fontFamily: 'Segoe UI', align: 'center'
      }).setOrigin(0.5, 0);

      // clickable
      const hit = this.add.rectangle(sx, centerY, 140, 110, 0xffffff, 0).setInteractive({ useHandCursor: true });
      hit.on('pointerdown', () => showPanel(s.key));
      hit.on('pointerover', () => {
        g.clear(); g.fillStyle(s.color,0.3); g.lineStyle(2,C.gold,1);
        g.strokeRoundedRect(sx-70,centerY-55,140,110,10);
        g.fillRoundedRect(sx-70,centerY-55,140,110,10);
      });
      hit.on('pointerout', () => {
        g.clear(); g.fillStyle(s.color,0.15); g.lineStyle(2,s.color,0.8);
        g.strokeRoundedRect(sx-70,centerY-55,140,110,10);
        g.fillRoundedRect(sx-70,centerY-55,140,110,10);
      });

      // arrow
      if (i < stages.length - 1) {
        const ag = this.add.graphics();
        ag.lineStyle(2, C.gold, 0.5);
        const ax = sx + 72; ag.lineBetween(ax, centerY, ax + 22, centerY);
        ag.lineBetween(ax+22, centerY, ax+14, centerY-6);
        ag.lineBetween(ax+22, centerY, ax+14, centerY+6);
      }

      // animated entrance
      this.add.tween({ targets: g, alpha: { from: 0, to: 1 }, duration: 400, delay: i * 150 });
    });

    // TTL table
    const ttlY = H * 0.70;
    this.add.text(W/2, ttlY - 10, 'Target Lifetimes', {
      fontSize: '14px', color: '#f39c12', fontFamily: 'Segoe UI', fontStyle: 'bold'
    }).setOrigin(0.5);
    const ttls = [
      { type: 'feature/*, bugfix/*, chore/*', time: 'days (< 1 sprint)',       col: C.feature },
      { type: 'hotfix/*',                     time: 'hours',                   col: C.hotfix },
      { type: 'spike/*, username/*',          time: '7 days (AI) / 14 days (human)', col: C.spike },
      { type: 'release/yyyy-mm-dd',           time: 'one sprint (UAT cycle)',  col: C.release },
      { type: 'development, staging, main',   time: 'permanent (long-lived envs)', col: C.main },
    ];
    ttls.forEach((t, i) => {
      const col = i % 2 === 0 ? 2 : 3;
      const tx = W * 0.08 + Math.floor(i/3) * W*0.46;
      const ty = ttlY + 20 + (i % 3) * 28;
      const tg = this.add.graphics();
      tg.fillStyle(t.col, 0.1); tg.lineStyle(1,t.col,0.4);
      tg.strokeRoundedRect(tx, ty, 380, 24, 4);
      tg.fillRoundedRect(tx, ty, 380, 24, 4);
      this.add.text(tx + 8, ty + 12, t.type, { fontSize:'11px', color:'#'+t.col.toString(16).padStart(6,'0'), fontFamily:'monospace' }).setOrigin(0,0.5);
      this.add.text(tx + 200, ty + 12, t.time, { fontSize:'11px', color:'#cdd', fontFamily:'Segoe UI' }).setOrigin(0,0.5);
    });

    // animated commit traveling along the lifecycle
    const traveler = this.add.graphics();
    traveler.fillStyle(C.gold, 1); traveler.fillCircle(0,0,8);
    const stageXs = stages.map((s,i) => 100 + i * stageW + stageW/2);
    let idx = 0;
    const moveTraveler = () => {
      if (idx >= stageXs.length) { idx = 0; traveler.x = stageXs[0]; traveler.y = centerY + 62; return; }
      this.tweens.add({
        targets: traveler, x: stageXs[idx], y: centerY + 62,
        duration: 800, ease: 'Sine.easeInOut',
        onComplete: () => { idx++; this.time.delayedCall(400, moveTraveler); }
      });
    };
    traveler.x = stageXs[0]; traveler.y = centerY + 62;
    this.time.delayedCall(500, moveTraveler);
  }
}

// SCENE: AI PAIRING
// ═══════════════════════════════════════════════════════════════════════════
class AiScene extends Phaser.Scene {
  constructor() { super({ key: 'AiScene' }); }
  create() {
    const W = this.scale.width, H = this.scale.height;
    drawBg(this, W, H);

    this.add.text(W/2, 38, 'AI-Paired Development - What Changes', {
      fontSize: '20px', color: '#f39c12', fontFamily: 'Segoe UI', fontStyle: 'bold'
    }).setOrigin(0.5);
    this.add.text(W/2, 66, 'Same branch shapes. Adjusted cadence, scope, and hygiene.', {
      fontSize: '12px', color: '#8899aa', fontFamily: 'Segoe UI'
    }).setOrigin(0.5);

    // Burst velocity visualisation
    const velY = H * 0.28;
    this.add.text(W*0.5, velY - 50, 'Velocity: Bursty, Not Steady', {
      fontSize: '13px', color: '#f39c12', fontFamily: 'Segoe UI', fontStyle: 'bold'
    }).setOrigin(0.5);

    // human pace (steady)
    const humanBars = [20,22,18,24,20,19,23,21];
    humanBars.forEach((h,i) => {
      const g = this.add.graphics();
      g.fillStyle(C.main, 0.6);
      g.fillRect(80 + i*60, velY - h, 40, h);
    });
    this.add.text(80 + humanBars.length*30, velY + 8, 'Human (steady)', {
      fontSize: '11px', color: '#3498db', fontFamily: 'Segoe UI'
    });

    // AI pace (spiky)
    const aiBars = [8,80,4,72,6,90,10,5];
    aiBars.forEach((h,i) => {
      const g = this.add.graphics();
      g.fillStyle(C.gold, h > 40 ? 0.9 : 0.3);
      g.fillRect(80 + i*60, velY - h, 40, h);
      if (h > 40) {
        const t = this.add.text(80+i*60+20, velY - h - 16, 'session!', {
          fontSize:'10px', color:'#f39c12', fontFamily:'monospace'
        }).setOrigin(0.5);
        this.tweens.add({ targets:t, y: velY-h-22, alpha:{from:0,to:1}, duration:600, delay:i*200 });
      }
    });
    this.add.text(80 + aiBars.length*60 + 10, velY - 50, 'AI-paired (bursty)', {
      fontSize: '11px', color: '#f39c12', fontFamily: 'Segoe UI'
    });

    // 4 key cards
    const cards = [
      { x: W*0.14, y: H*0.60, color: C.gold,    key: 'ai_velocity', icon: '⚡', label: 'Announce\nImmediately', sub: 'Claim + finish\nfaster than standup' },
      { x: W*0.38, y: H*0.60, color: C.feature,  key: 'ai_scope',    icon: '📦', label: 'Session\nScope',      sub: 'One session =\none branch' },
      { x: W*0.62, y: H*0.60, color: C.spike,    key: 'ai_spike',    icon: '🗑', label: 'Spike TTL\n7 days',   sub: 'Delete losers\nRebuild winners' },
      { x: W*0.86, y: H*0.60, color: C.release,  key: 'ai_pr',       icon: '🔍', label: 'Smaller\nPRs',        sub: 'More care per line\nnote AI authorship' },
    ];
    cards.forEach(c => {
      const g = this.add.graphics();
      g.fillStyle(c.color, 0.12); g.lineStyle(2, c.color, 0.8);
      g.strokeRoundedRect(c.x-80, c.y-60, 160, 130, 10);
      g.fillRoundedRect(c.x-80, c.y-60, 160, 130, 10);
      this.add.text(c.x, c.y-36, c.icon, { fontSize:'26px' }).setOrigin(0.5);
      this.add.text(c.x, c.y-4, c.label, { fontSize:'13px', color:'#'+c.color.toString(16).padStart(6,'0'), fontFamily:'Segoe UI', fontStyle:'bold', align:'center' }).setOrigin(0.5);
      this.add.text(c.x, c.y+28, c.sub, { fontSize:'11px', color:'#8899aa', fontFamily:'Segoe UI', align:'center' }).setOrigin(0.5);
      const hit = this.add.rectangle(c.x, c.y, 160, 130, 0xffffff, 0).setInteractive({ useHandCursor: true });
      hit.on('pointerdown', () => showPanel(c.key));
      hit.on('pointerover', () => { g.clear(); g.fillStyle(c.color,0.25); g.lineStyle(2,C.gold,1); g.strokeRoundedRect(c.x-80,c.y-60,160,130,10); g.fillRoundedRect(c.x-80,c.y-60,160,130,10); });
      hit.on('pointerout',  () => { g.clear(); g.fillStyle(c.color,0.12); g.lineStyle(2,c.color,0.8); g.strokeRoundedRect(c.x-80,c.y-60,160,130,10); g.fillRoundedRect(c.x-80,c.y-60,160,130,10); });
      this.tweens.add({ targets: g, alpha:{from:0,to:1}, y:{from:c.y+10,to:0}, duration:500, delay:cards.indexOf(c)*150 });
    });

    // SESSION.md reminder
    const note = this.add.text(W/2, H*0.85, '📝  Always commit + push SESSION.md before ending a session - agents start cold next time', {
      fontSize: '12px', color: '#f39c1299', fontFamily: 'Segoe UI', align:'center', wordWrap:{ width: W*0.75 }
    }).setOrigin(0.5);
    this.tweens.add({ targets:note, alpha:{from:0.4,to:1}, duration:1800, yoyo:true, loop:-1 });

    // Stale branch counter ticker (visual metaphor - illustrative, not actual numbers)
    let count = 0;
    const counter = this.add.text(W*0.5, H*0.35, 'Stale branch count: 0', {
      fontSize:'13px', color:'#e74c3c', fontFamily:'monospace'
    }).setOrigin(0.5);
    this.time.addEvent({ delay:80, repeat:40, callback: () => {
      count += 2;
      counter.setText(`Stale branches (without TTL): ${count}`);
      if (count >= 80) { counter.setColor('#ff6666'); counter.setText('⚠  Stale branches pile up fast without a TTL'); }
    }});
  }
}

// PHASER CONFIG
// ═══════════════════════════════════════════════════════════════════════════
const config = {
  type: Phaser.AUTO,
  parent: 'game-container',
  width: window.innerWidth,
  height: window.innerHeight - 54,
  backgroundColor: '#0a1628',
  scene: [OverviewScene, Tier1Scene, Tier2Scene, LifecycleScene, NamingScene, AiScene],
  scale: { mode: Phaser.Scale.RESIZE, autoCenter: Phaser.Scale.CENTER_BOTH },
};

const game = new Phaser.Game(config);

// ─── Nav switching ─────────────────────────────────────────────────────────
const sceneMap = {
  overview:  'OverviewScene',
  tier1:     'Tier1Scene',
  tier2:     'Tier2Scene',
  lifecycle: 'LifecycleScene',
  naming:    'NamingScene',
  ai:        'AiScene',
};
const titles = {
  overview:  'Branching Strategy',
  tier1:     'Tier 1 - Solo',
  tier2:     'Tier 2 - Small Team',
  lifecycle: 'Branch Lifecycle',
  naming:    'Naming Convention',
  ai:        'AI Pairing',
};

// Each scene has a matching INFO key so the panel can auto-open with the right context.
const sceneInfoKey = {
  overview:  'overview',
  tier1:     'tier1',
  tier2:     'tier2',
  lifecycle: 'lifecycle',
  naming:    'naming',
  ai:        'ai',
};

const state = { currentScene: 'overview' };

function goToScene(key) {
  if (!sceneMap[key] || key === state.currentScene) return;
  const targetSceneKey = sceneMap[key];

  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.scene === key);
  });
  document.getElementById('scene-title').textContent = titles[key];

  // Stop every scene we manage (idempotent on inactive ones) so the canvas
  // can't carry residual graphics from a prior visit. Then start the target
  // fresh so its create() runs against a clean display list.
  Object.values(sceneMap).forEach(sk => {
    const s = game.scene.getScene(sk);
    if (!s) return;
    if (s.scene.isActive() || s.scene.isPaused() || s.scene.isSleeping()) {
      game.scene.stop(sk);
    }
  });
  game.scene.start(targetSceneKey);
  state.currentScene = key;

  const infoKey = sceneInfoKey[key];
  if (infoKey && INFO[infoKey]) showPanel(infoKey);
  else document.getElementById('info-panel').classList.remove('open');
}

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => goToScene(btn.dataset.scene));
});

if (INFO[sceneInfoKey.overview]) showPanel(sceneInfoKey.overview);
</script>
